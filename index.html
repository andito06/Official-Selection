<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Archive 🤍</title>
<style>
body{
  margin:0;
  padding:0;
  font-family:'Georgia', serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ffc0cb,#ffd6e7,#ffb6c1);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow-y:auto;
  padding-top:40px;
}

/* floating hearts & flowers & stars */
.floating{
  position:fixed;
  top:-50px;
  font-size:18px;
  animation:fall linear infinite;
  opacity:0.7;
  pointer-events:none;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg);}
}

.container{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.9);
  padding:40px 25px;
  border-radius:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
  text-align:center;
  position:relative;
  z-index:2;
}

/* Opening */
#opening button{
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#ff6f91;
  color:white;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(255,105,135,0.4);
  transition:0.3s;
}

#opening button:hover{
  transform:scale(1.05);
}

.hidden{ display:none; }

h1{
  color:#5c1f2b;
  font-size:22px;
  margin-bottom:8px;
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
}

p{
  color:#7a2f3f;
  font-size:14px;
  margin-bottom:25px;
  opacity:0;
  transform:translateY(20px);
  transition:1s ease;
}

.divider{
  width:60px;
  height:4px;
  background:#ff6f91;
  margin:0 auto 25px auto;
  border-radius:10px;
  opacity:0;
  transition:1.2s ease;
}

/* card links */
.links{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:20px;
}

.links a{
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  padding:16px;
  border-radius:20px;
  background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffd6e7);
  color:white;
  font-weight:600;
  font-size:15px;
  box-shadow:0 8px 20px rgba(255,105,135,0.3);
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
  position:relative;
  overflow:hidden;
}

.links a:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 12px 25px rgba(255,105,135,0.5);
}

.show{
  opacity:1 !important;
  transform:translateY(0) !important;
}
</style>
</head>
<body>

<!-- floating symbols -->
<script>
const symbols = ["🌸","💗","⭐","🌷"];
for(let i=0;i<25;i++){
  const el = document.createElement("div");
  el.className="floating";
  el.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
  el.style.left = Math.random()*100 + "vw";
  el.style.animationDuration = (5 + Math.random()*5) + "s";
  el.style.fontSize = (14 + Math.random()*12) + "px";
  document.body.appendChild(el);
}
</script>

<!-- musik -->
<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <!-- OPENING -->
  <div id="opening">
    <button onclick="buka()">Open kalau yakin 🤍</button>
  </div>

  <!-- ISI -->
  <div id="isi" class="hidden">
    <h1 id="title">semua ini aku bikin karena kamu.</h1>
    <p id="subtitle">kalau suatu hari kamu kangen, buka yang mana aja ya 🤍</p>
    <div class="divider" id="divider"></div>

    <div class="links">
      <a href="https://andito06.github.io/valentine-cayang/" id="l1">🌙 Valentine</a>
      <a href="https://andito06.github.io/halow/" id="l2">🎧 surat waktu itu</a>
      <a href="https://andito06.github.io/DALI-DEDE/" id="l3">💌 quiz kecil tentang acuu</a>
      <a href="https://andito06.github.io/BWAAA/" id="l4">✨ Isii hatii cayangg</a>
      <a href="https://andito06.github.io/EEMMM/" id="l5">💝 malam itu</a>
      <a href="vidio.mp4" id="l6">📽️💗 dali cayang</a>
    </div>
  </div>
</div>

<script>
function buka(){
  document.getElementById("opening").style.display="none";
  document.getElementById("isi").classList.remove("hidden");
  
  // mainkan musik
  const audio = document.getElementById("musik");
  audio.volume=0.4; // atur volume, bisa ubah sendiri
  audio.play();

  setTimeout(()=>{ document.getElementById("title").classList.add("show"); },300);
  setTimeout(()=>{ document.getElementById("subtitle").classList.add("show"); },700);
  setTimeout(()=>{ document.getElementById("divider").classList.add("show"); },1000);

  const links = document.querySelectorAll(".links a");
  links.forEach((link,index)=>{
    setTimeout(()=>{ link.classList.add("show"); },1300+(index*200));
  });
}
</script>

</body>
</html>
